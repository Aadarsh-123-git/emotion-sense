kind = "web"
previewPath = "/"
title = "EmotionSense"
version = "1.0.0"
id = "artifacts/emotion-sense"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18603

[services.development]
run = "pnpm --filter @workspace/emotion-sense run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/emotion-sense", "run", "build" ]
publicDir = "artifacts/emotion-sense/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18603"
BASE_PATH = "/"
